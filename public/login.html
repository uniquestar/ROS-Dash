<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROS-Dash — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .logo img {
      width: 40px;
      height: 40px;
    }

    .logo span {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4f6ef7;
    }

    .error {
      background: #3b1a1a;
      border: 1px solid #7f2d2d;
      color: #f87171;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error.show { display: block; }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    button:hover { background: #3d5ce0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/logo.png" alt="ROS-Dash">
      <span>ROS-Dash</span>
    </div>
    <h2>Sign in to continue</h2>

    <div class="error" id="err">Incorrect username or password</div>

    <form method="POST" action="/login" id="loginForm">
      <input type="hidden" name="_csrf" id="csrfToken" value="">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    // Fetch CSRF token and populate form
    fetch('/api/csrf-token', { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        document.getElementById('csrfToken').value = data.csrfToken;
      })
      .catch(err => console.error('Failed to fetch CSRF token:', err));

    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>
</html>
